    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Advanced Report Builder — describe a report in the UI, the API compiles it to optimized SQL, and it renders as tables, charts, or scheduled exports."
    />
    <title>Advanced Report Builder</title>
    <script>
      // Apply the saved theme before first paint to avoid a flash of the wrong theme.
      try {
        const stored = localStorage.getItem('arb_theme')
        const dark = stored ? stored === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches
        if (dark) document.documentElement.classList.add('dark')
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
