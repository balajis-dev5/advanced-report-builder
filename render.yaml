# Render Blueprint: deploys the whole project (API + SPA) on the free tier.
# In Render: New → Blueprint → pick this repo → Apply.
#
# Free-tier notes, on purpose for a demo:
# - The API container uses SQLite baked into its filesystem, so every deploy
#   (and every cold start after idle spin-down) begins from a freshly seeded
#   demo database. Nothing a visitor saves is meant to survive.
# - JWT_SECRET is generated by Render so logins survive restarts; APP_KEY is
#   generated at boot by docker/start.sh (Laravel needs its exact key format).
services:
  - type: web
    name: arb-api-balaji
    runtime: docker
    rootDir: api
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_NAME
        value: Advanced Report Builder
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /app/database/database.sqlite
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://arb-web-balaji.onrender.com

  - type: web
    name: arb-web-balaji
    runtime: static
    rootDir: web
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://arb-api-balaji.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
